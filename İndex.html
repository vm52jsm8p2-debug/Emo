<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; background: #2e7d32; touch-action: none; font-family: sans-serif; }
        canvas { display: block; }
    </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let x = canvas.width / 2, y = canvas.height - 100;
    let dx = 5, dy = -5;
    let ballRadius = 10;
    let paddleWidth = 100, paddleX = (canvas.width - 100) / 2;

    // Kale
    let goalWidth = 150;
    let goalX = (canvas.width - goalWidth) / 2;

    canvas.addEventListener("touchmove", (e) => {
        paddleX = e.touches[0].clientX - paddleWidth / 2;
    });

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Saha Çizgileri
        ctx.strokeStyle = "white";
        ctx.lineWidth = 3;
        ctx.strokeRect(20, 20, canvas.width - 40, canvas.height - 40); // Saha kenarı
        ctx.beginPath();
        ctx.moveTo(0, canvas.height/2); ctx.lineTo(canvas.width, canvas.height/2);
        ctx.stroke();

        // Kale (Üstte)
        ctx.fillStyle = "#fff";
        ctx.fillRect(goalX, 0, goalWidth, 20);

        // Oyuncu (Forvet)
        ctx.fillStyle = "#ffeb3b";
        ctx.fillRect(paddleX, canvas.height - 40, paddleWidth, 15);

        // Top
        ctx.beginPath();
        ctx.arc(x, y, ballRadius, 0, Math.PI * 2);
        ctx.fillStyle = "white";
        ctx.fill();
        ctx.closePath();

        // Çarpışmalar
        if(x + dx > canvas.width - ballRadius || x + dx < ballRadius) dx = -dx;
        
        // Kale Gol Kontrolü
        if(y < 20 && x > goalX && x < goalX + goalWidth) {
            alert("GOL!!!");
            x = canvas.width/2; y = canvas.height - 100; // Başa dön
        } else if(y < ballRadius) { dy = -dy; }

        // Forvet Çarpışması
        if(y + dy > canvas.height - 40 - ballRadius && x > paddleX && x < paddleX + paddleWidth) {
            dy = -dy;
        }

        x += dx; y += dy;
        requestAnimationFrame(draw);
    }
    draw();
</script>
</body>
</html>
